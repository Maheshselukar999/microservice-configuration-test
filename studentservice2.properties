spring.application.name=studentservice2
server.port=8183

# Database Configuration
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/student_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA Configuration
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8787/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Circuit breaker configuration
resilience4j.circuitbreaker.instances.courseservice2.register-health-indicator=true
resilience4j.circuitbreaker.instances.courseservice2.sliding-window-size=5
resilience4j.circuitbreaker.instances.courseservice2.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.courseservice2.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.courseservice2.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.courseservice2.automatic-transition-from-open-to-half-open-enabled=true

management.endpoints.web.exposure.include=*
